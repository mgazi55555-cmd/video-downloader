<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل الفيديوهات الذكي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 20px; }
        input[type="url"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            text-align: left;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 95%;
            transition: background 0.3s;
        }
        button:hover { background-color: #218838; }
        .footer { margin-top: 20px; color: #777; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 محمل الفيديوهات</h1>
    <p>أدخل رابط الفيديو من أي موقع ليتم تحميله فوراً</p>
    
    <form action="/download" method="POST">
        <input type="url" name="url" placeholder="https://example.com/video..." required>
        <button type="submit">تحميل الفيديو الآن</button>
    </form>

    <div class="footer">صنع بكل حب ✨</div>
</div>

</body>
</html>
